<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/0355e7ccd9.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <title>Top Down Styler</title>
  </head>
  <body>
    <header>
      <button id="add-problem">
        <i class="fa-solid fa-plus"></i>
        Adicionar Problema
      </button>
      <button id="on-notifications">
        <i class="fa-regular fa-bell"></i>
      </button>
      <img id="perfil" src="assets/perfil.jpg" alt="minha foto de perfil" />
    </header>
    <main>
      <section id="dashboard">
        <section id="problem-breakdown">
          <div id="container-problem">
            <h2>Problem Breakdown</h2>
            <button class="add-subproblem">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
          <ul id="main-subproblems">           
            <!-- Criar <li> dinamicamente para os subproblemas principais -->
          </ul>
        </section>
        <section id="container-functions">
          <h2>Soluções & Funções</h2>
          <table>
            <colgroup>
              <col style="width: 200px" />
              <col style="width: 400px" />
              <col style="width: 200px" />
              <col style="width: 200px" />
            </colgroup>
            <thead>
              <tr>
                <th>Nome da função</th>
                <th>Descrição</th>
                <th>Problema</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <!-- Aqui terão os <td> dinamicamente ao adicionar funções -->
            </tbody>
          </table>
        </section>
      </section>
      <section id="notes">
        <h2>Seção de Anotações</h2>
        <textarea></textarea>
      </section>
    </main>
  </body>
</html>
